<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Instagram Nick Tarayıcı</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header>
      <h1>Instagram Nick Tarayıcı</h1>
      <p class="sub">
        Signup endpoint tabanlı — 404 değil. Boş / alınmış / rezerve / yasaklı
        nickleri ayırt eder.
      </p>
    </header>

    <main>
      <section class="panel input-panel">
        <div class="tabs">
          <button class="tab active" data-tab="manual">Manuel liste</button>
          <button class="tab" data-tab="generated">Otomatik üret</button>
        </div>

        <div class="tab-content" id="tab-manual">
          <label for="usernames"
            >Kullanıcı adları (her satıra bir tane, virgülle de
            ayırabilirsin)</label
          >
          <textarea
            id="usernames"
            rows="8"
            placeholder="cristiano&#10;instagram&#10;admin&#10;xkcdtest9z9z9z"
          ></textarea>
        </div>

        <div class="tab-content hidden" id="tab-generated">
          <label>Hane (uzunluk)</label>
          <select id="gen-length">
            <option value="3">3 hane</option>
            <option value="4" selected>4 hane</option>
            <option value="5">5 hane</option>
            <option value="6">6 hane</option>
            <option value="7">7 hane</option>
            <option value="8">8 hane</option>
          </select>

          <label style="margin-top: 10px">Adet (en fazla 500)</label>
          <input type="number" id="gen-count" value="50" min="1" max="500" />

          <label style="margin-top: 10px">Karakter seti</label>
          <select id="gen-alphabet">
            <option value="alnum" selected>Harf + rakam (a-z, 0-9)</option>
            <option value="alpha">Sadece harf (a-z)</option>
            <option value="num">Sadece rakam (0-9)</option>
            <option value="alnum_dot">Harf + rakam + . _</option>
          </select>

          <p class="hint" id="gen-hint"></p>
        </div>

        <div class="controls">
          <label class="checkbox">
            <input type="checkbox" id="use-proxies" checked />
            Server proxy listesini kullan
            <span class="proxy-info" id="proxy-info">(yükleniyor...)</span>
          </label>
          <label class="inline">
            Gecikme (sn)
            <input
              type="number"
              id="delay"
              value="2.5"
              min="0"
              step="0.5"
              style="width: 5em"
            />
          </label>
          <button id="run">Tara</button>
          <button id="stop" class="secondary" disabled>Durdur</button>
          <button id="csv" class="secondary" disabled>CSV indir</button>
        </div>

        <div id="status" class="status"></div>
      </section>

      <section class="panel results-panel">
        <div class="summary" id="summary"></div>
        <div class="filter-bar" id="filter-bar"></div>
        <table id="results">
          <thead>
            <tr>
              <th>#</th>
              <th>Nick</th>
              <th>Durum</th>
              <th>IG Kodu</th>
              <th>Mesaj</th>
              <th>Proxy</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <footer>
      <p>
        Kaynak:
        <a href="https://github.com/gokturkx-web/ig" target="_blank"
          >github.com/gokturkx-web/ig</a
        >
      </p>
    </footer>

    <script src="/static/app.js"></script>
  </body>
</html>
